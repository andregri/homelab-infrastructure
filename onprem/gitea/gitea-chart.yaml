apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea-helm-chart
  namespace: argocd
spec:
  project: default
  source:
    chart: gitea
    repoURL: https://dl.gitea.com/charts/
    targetRevision: 12.5.0
    helm:
      values: |
        gitea:
          config:
            database:
              DB_TYPE: postgres
              HOST: postgres-cluster-rw.gitea.svc.cluster.local:5432
              NAME: giteadb
              USER: gitea
              PASSWD: gitea
              SCHEMA: gitea
        persistence:
          storageClass: local-path
        postgresql:
          enabled: false
        postgresql-ha:
          enabled: false
        service:
          http:
            type: NodePort
            port: 3000
            nodePort: 30773
          ssh:
            type: ClusterIP
            port: 22
            clusterIP:
        valkey-cluster:
          persistence:
            storageClass: local-path
  destination:
    server: "https://kubernetes.default.svc"
    namespace: gitea
  syncPolicy:
    syncOptions:
    - CreateNamespace=true