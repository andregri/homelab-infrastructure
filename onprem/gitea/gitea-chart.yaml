apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
spec:
  project: default
  source:
    chart: gitea
    repoURL: https://dl.gitea.com/charts/
    targetRevision: 12.5.0
    helm:
      releaseName: gitea
      valuesObject:
        additionalConfigFromEnvs:
          - export GITEA__database__HOST="cluster-rw:5432"
          - export GITEA__database__NAME="giteadb"
          - export GITEA__database__USER="gitea"
          - export GITEA__database__PASSWD="gitea"
        postgresql:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: gitea
  syncPolicy:
    syncOptions:
    - CreateNamespace=true