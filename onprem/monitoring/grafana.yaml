apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    chart: grafana
    repoURL: https://grafana-community.github.io/helm-charts/grafana-community
    targetRevision: 11.3.2
    helm:
      releaseName: grafana
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring